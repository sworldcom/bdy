<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 1.1em;
            line-height: 1.5;
        }

        .cake {
            font-size: 5rem;
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .cake:hover {
            transform: scale(1.1);
        }

        .btn {
            background-color: #4ecdc4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #ff6b6b;
        }

        /* Basic Confetti Particle */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #ffd166;
            animation: fall 3s linear infinite;
            top: -10px;
            border-radius: 50%;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="cake" id="cake" onclick="makeConfetti()">🎂</div>
        <h1 id="title">Happy Birthday!</h1>
        <p id="message">Wishing you a wonderful day filled with joy, laughter, and plenty of cake. Click the button to celebrate!</p>
        <button class="btn" onclick="celebrate()">Make a Wish</button>
    </div>

    <script>
        function celebrate() {
            const cake = document.getElementById('cake');
            const title = document.getElementById('title');
            const message = document.getElementById('message');
            
            // Change text and icon
            cake.textContent = "🍰";
            title.textContent = "Make a Wish!";
            message.textContent = "May all your dreams and wishes come true this year!";
            
            // Spawn a burst of confetti
            for (let i = 0; i < 50; i++) {
                createConfetti();
            }
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            
            // Randomize styling
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 70%)`;
            confetti.style.animationDuration = (Math.random() * 2 + 2) + 's'; 
            confetti.style.opacity = Math.random();
            
            document.body.appendChild(confetti);

            // Remove confetti element after it falls
            setTimeout(() => {
                confetti.remove();
            }, 4000);
        }
    </script>
</body>
</html>
